name: Automated "Over-The-Air" Update
on:
  push:
    branches:
      - main # Runs whenever you push code to this branch

jobs:
  update:
    name: Publish OTA Update
    runs-on: ubuntu-latest
    steps:
      - name: 🏗 Checkout code
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: 🏗 Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }} # Uses the token you added to GitHub

      - name: 📦 Install dependencies
        run: npm ci --legacy-peer-deps

      - name: 🚀 Publish Update
        run: eas update --branch production --message "${{ github.event.head_commit.message }}"
